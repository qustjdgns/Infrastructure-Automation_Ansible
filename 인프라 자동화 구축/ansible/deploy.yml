- hosts: k8s_control_node
  tasks:
    - name: Deploy to K8s
      shell: |
        kubectl apply -f - <<EOF
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: my-web-app
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: my-web-app
          template:
            metadata:
              labels:
                app: my-web-app
            spec:
              containers:
              - name: my-web-app
                image: {{ docker_username }}/my-web-app:latest
                ports:
                - containerPort: 80
        EOF

        # Service 적용
        kubectl apply -f - <<EOF
        apiVersion: v1
        kind: Service
        metadata:
          name: my-web-service
        spec:
          type: NodePort
          selector:
            app: my-web-app
          ports:
            - port: 80
              targetPort: 80
              nodePort: 30001
        EOF