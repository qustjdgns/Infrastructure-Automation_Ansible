---
# 실행: ansible-playbook -i inventory/hosts.ini reset.yml
# 마스터/워커의 쿠버네티스 설정을 완전히 초기화합니다. (Harbor는 건드리지 않음)

- name: K8s 클러스터 초기화
  hosts: k8s_cluster
  become: true
  tasks:
    - name: kubeadm reset
      command: kubeadm reset -f
      ignore_errors: true

    - name: kubernetes 설정 디렉토리 삭제
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/kubernetes
        - /var/lib/etcd
        - /etc/cni/net.d
        - "/home/{{ ansible_user }}/.kube"

    - name: iptables 초기화
      shell: |
        iptables -F
        iptables -t nat -F
        iptables -t mangle -F
        iptables -X
      changed_when: true

    - name: containerd 재시작
      systemd:
        name: containerd
        state: restarted
